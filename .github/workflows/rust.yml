name: Rust

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            artifact: lser-linux-x86_64
            binary: target/release/lser
          - os: windows-latest
            artifact: lser-windows-x86_64
            binary: target/release/lser.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  cross:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-20.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: arm-unknown-linux-gnueabi
            artifact: lser-linux-arm-eabi
          - target: arm-unknown-linux-gnueabihf
            artifact: lser-linux-arm-eabihf
          - target: aarch64-unknown-linux-gnu
            artifact: lser-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cross-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cross-${{ matrix.target }}-cargo-

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cross-compile
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/lser

  release:
    name: Publish Release
    needs: [build, cross]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp dist/lser-linux-x86_64/lser        release/lser-linux-x86_64
          cp dist/lser-windows-x86_64/lser.exe  release/lser-windows-x86_64.exe
          cp dist/lser-linux-arm-eabi/lser       release/lser-linux-arm-eabi
          cp dist/lser-linux-arm-eabihf/lser     release/lser-linux-arm-eabihf
          cp dist/lser-linux-aarch64/lser        release/lser-linux-aarch64
          chmod +x release/lser-linux-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/lser-linux-x86_64
            release/lser-windows-x86_64.exe
            release/lser-linux-arm-eabi
            release/lser-linux-arm-eabihf
            release/lser-linux-aarch64
          generate_release_notes: true
